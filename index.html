<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>간단 MBTI 성향 체크</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="app">
      <header class="app-header">
        <h1>간단 MBTI 성향 체크</h1>
        <p>몇 가지 질문에 답하고, 나의 MBTI 경향을 가볍게 확인해 보세요.</p>
      </header>

      <main class="app-main">
        <section id="question-section" class="card">
          <div id="question-container"></div>

          <div class="progress">
            <span id="progress-text"></span>
            <div class="progress-bar">
              <div id="progress-fill"></div>
            </div>
          </div>

          <div class="nav-buttons">
            <button id="prev-btn" class="btn secondary" type="button">이전</button>
            <button id="next-btn" class="btn primary" type="button">다음</button>
          </div>
        </section>

        <section id="result-section" class="card card-hidden">
          <h2>결과</h2>
          <p class="result-type">
            당신의 MBTI 경향은 <span id="result-mbti"></span> 입니다.
          </p>
          <p id="result-description" class="result-description"></p>

          <div class="result-details">
            <h3>지표별 점수</h3>
            <ul id="result-scores"></ul>
          </div>

          <div class="history">
            <h3>최근 결과 비교</h3>
            <ul id="history-list"></ul>
          </div>

          <button id="retry-btn" class="btn secondary" type="button">다시 해보기</button>
        </section>
      </main>

      <footer class="app-footer">
        <small>※ 실제 심리검사가 아닌, 가볍게 즐기는 참고용 도구입니다.</small>
      </footer>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
